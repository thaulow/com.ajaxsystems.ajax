<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- DoorProtect: two tall narrow pills side by side -->
  <!-- Sensor piece (left): taller pill with LED bar -->
  <rect x="100" y="80" width="300" height="800" rx="150" fill="none" stroke="#000" stroke-width="52"/>
  <!-- LED indicator bar near top of sensor -->
  <rect x="168" y="180" width="164" height="38" rx="19" fill="#000"/>
  <!-- Magnet piece (right): slightly shorter narrower pill -->
  <rect x="560" y="140" width="240" height="680" rx="120" fill="none" stroke="#000" stroke-width="52"/>
</svg>
