<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- LeaksProtect: squircle body (flat floor sensor) -->
  <rect x="110" y="160" width="740" height="640" rx="160" fill="none" stroke="#000" stroke-width="52"/>
  <!-- Contact electrode pins protruding from bottom (detect water on floor) -->
  <line x1="300" y1="800" x2="300" y2="890" stroke="#000" stroke-width="52" stroke-linecap="round"/>
  <line x1="480" y1="800" x2="480" y2="890" stroke="#000" stroke-width="52" stroke-linecap="round"/>
  <line x1="660" y1="800" x2="660" y2="890" stroke="#000" stroke-width="52" stroke-linecap="round"/>
</svg>
