<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- MultiTransmitter: rectangular body with chamfered top corners (distinctive angular shape) -->
  <polygon points="290,110 670,110 850,290 850,870 110,870 110,290" fill="none" stroke="#000" stroke-width="52" stroke-linejoin="round"/>
  <!-- Angular V-groove facet lines from chamfered corners to center -->
  <line x1="290" y1="110" x2="480" y2="390" stroke="#000" stroke-width="44" stroke-linecap="round"/>
  <line x1="670" y1="110" x2="480" y2="390" stroke="#000" stroke-width="44" stroke-linecap="round"/>
  <!-- Two mounting screw holes near top corners -->
  <circle cx="320" cy="220" r="36" fill="none" stroke="#000" stroke-width="40"/>
  <circle cx="640" cy="220" r="36" fill="none" stroke="#000" stroke-width="40"/>
  <!-- LED status indicator top right -->
  <rect x="718" y="196" width="88" height="44" rx="22" fill="#000"/>
</svg>
