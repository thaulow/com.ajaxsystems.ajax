<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- KeyPad Plus: portrait rounded rectangle -->
  <rect x="185" y="90" width="590" height="780" rx="80" fill="none" stroke="#000" stroke-width="52"/>
  <!-- Top icon row: 4 small touch-sensor dots (fingerprint, arm, disarm, night) -->
  <circle cx="293" cy="228" r="34" fill="#000"/>
  <circle cx="427" cy="228" r="34" fill="#000"/>
  <circle cx="533" cy="228" r="34" fill="#000"/>
  <circle cx="667" cy="228" r="34" fill="#000"/>
  <!-- 3×3 number button grid -->
  <circle cx="316" cy="378" r="44" fill="#000"/>
  <circle cx="480" cy="378" r="44" fill="#000"/>
  <circle cx="644" cy="378" r="44" fill="#000"/>
  <circle cx="316" cy="508" r="44" fill="#000"/>
  <circle cx="480" cy="508" r="44" fill="#000"/>
  <circle cx="644" cy="508" r="44" fill="#000"/>
  <circle cx="316" cy="638" r="44" fill="#000"/>
  <circle cx="480" cy="638" r="44" fill="#000"/>
  <circle cx="644" cy="638" r="44" fill="#000"/>
  <!-- Bottom function row: C, 0, * -->
  <circle cx="316" cy="762" r="44" fill="#000"/>
  <circle cx="480" cy="762" r="44" fill="#000"/>
  <circle cx="644" cy="762" r="44" fill="#000"/>
</svg>
