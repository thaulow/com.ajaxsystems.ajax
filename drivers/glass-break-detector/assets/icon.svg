<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960">
  <!-- GlassProtect: single tall narrow pill (like a thick marker cap) -->
  <rect x="330" y="60" width="300" height="840" rx="150" fill="none" stroke="#000" stroke-width="52"/>
  <!-- LED glow band near top -->
  <rect x="384" y="160" width="192" height="38" rx="19" fill="#000"/>
  <!-- Microphone aperture (small circle in center) -->
  <circle cx="480" cy="500" r="32" fill="#000"/>
</svg>
